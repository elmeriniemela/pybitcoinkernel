# Build prebuilt wheels with cibuildwheel on version tags (v*). The
# cibuildwheel behavior itself (kernel build, bundling, per-wheel tests)
# is configured in [tool.cibuildwheel] in pyproject.toml.

name: wheels

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - ".github/workflows/wheels.yml"
      - "pyproject.toml"
      - "setup.py"
      - "src/**"
  workflow_dispatch:

jobs:
  build_wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04       # linux x86_64
          - ubuntu-24.04-arm   # linux aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    # The sdist contains the binding sources but not the bitcoin
    # submodule; installing from it requires a kernel via the
    # BITCOINKERNEL_* environment variables (see README).
    name: sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
