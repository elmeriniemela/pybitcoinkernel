name: unit tests

on:
  push:
    branches: ["**"]
  pull_request:
    paths:
      - ".github/workflows/unit-tests.yml"
      - "pyproject.toml"
      - "setup.py"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libboost-dev

      - name: Build libbitcoinkernel
        run: |
          cmake -S external/bitcoin -B vendor/build \
            -DBUILD_KERNEL_LIB=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DAEMON=OFF \
            -DBUILD_CLI=OFF \
            -DBUILD_TX=OFF \
            -DBUILD_UTIL=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DENABLE_WALLET=OFF \
            -DWITH_ZMQ=OFF \
            -DENABLE_IPC=OFF
          cmake --build vendor/build --target bitcoinkernel --parallel "$(nproc)"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run unit tests
        run: python -m pytest -q
